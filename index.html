<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>D&D Group Finder</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!-- Top Navigation Bar -->
    <nav class="navbar">
      <div class="nav-left">
        <img src="https://upload.wikimedia.org/wikipedia/en/8/8e/Dungeons_%26_Dragons_5th_Edition_logo.svg" alt="D&D Logo" class="nav-logo" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';" />
        <div id="logo-fallback" class="logo-fallback" style="display:none;">D&D</div>
        <div class="nav-search-wrapper">
          <input id="nav-search" type="text" placeholder="Search for groups" class="nav-search" />
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
      </div>
      <div class="nav-right">
        <button class="nav-btn" id="my-groups-btn">My Groups</button>
        <button class="nav-btn create-btn" id="create-btn">Create +</button>
        <button class="profile-btn" id="profile-btn" aria-label="Profile">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
        </button>
      </div>
    </nav>

    <hr class="nav-divider" />

    <!-- Home Page -->
    <main class="container page" id="page-home">
      <h1 class="hero-title">D&D Group Finder</h1>

      <div class="hero-search-wrapper">
        <input id="hero-search" type="text" placeholder="Search for groups" class="hero-search" />
        <svg class="hero-search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
    </main>

    <!-- Search Page -->
    <main class="search-page page" id="page-search" style="display:none;">
      <!-- Filter Bar -->
      <div class="filter-bar">
        <span class="filter-label">Filters:</span>
        <div class="filter-tags" id="filter-tags">
          <!-- Tags will go here later -->
        </div>
        <button class="filter-icon-btn" id="filter-icon-btn" aria-label="Open filters">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        </button>
      </div>

      <div class="search-content">
        <!-- Left: Scrollable Listings -->
        <div class="listings-panel" id="listings-panel">
          <!-- Listings injected by JS -->
        </div>

        <!-- Right: Detail View -->
        <div class="detail-panel" id="detail-panel">
          <!-- Detail injected by JS -->
        </div>
      </div>
    </main>

    <!-- Filter Page -->
    <main class="filter-page page" id="page-filters" style="display:none;">
      <div class="filter-page-header">
        <div class="filter-page-header-left">
          <button class="back-btn" id="filter-back-btn" aria-label="Go back">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          </button>
          <h2 class="filter-page-title">Filters</h2>
        </div>
        <button class="apply-btn" id="apply-filters-btn">Apply</button>
      </div>

      <hr class="section-divider" />

      <p class="filter-selection-count" id="filter-selection-count">0 / 4 selected</p>

      <div class="filter-categories">
        <div class="filter-category">
          <h3 class="filter-cat-title">Experience</h3>
          <div class="filter-cat-options">
            <button class="ftag ftag-teal" data-value="Beginner">Beginner</button>
            <button class="ftag ftag-teal" data-value="Intermediate">Intermediate</button>
            <button class="ftag ftag-teal" data-value="Advanced">Advanced</button>
            <button class="ftag ftag-teal" data-value="Expert">Expert</button>
          </div>
        </div>
        <div class="filter-category">
          <h3 class="filter-cat-title">Length</h3>
          <div class="filter-cat-options">
            <button class="ftag ftag-teal" data-value="≤ 1 hour">≤ 1 hour</button>
            <button class="ftag ftag-teal" data-value="1-2 hours">1 - 2 hours</button>
            <button class="ftag ftag-teal" data-value="2-3 hours">2 - 3 hours</button>
            <button class="ftag ftag-teal" data-value="3-5 hours">3 - 5 hours</button>
          </div>
        </div>
        <div class="filter-category">
          <h3 class="filter-cat-title">Frequency</h3>
          <div class="filter-cat-options">
            <button class="ftag ftag-orange" data-value="Daily">Daily</button>
            <button class="ftag ftag-orange" data-value="Weekly">Weekly</button>
            <button class="ftag ftag-orange" data-value="Bi-weekly">Bi-weekly</button>
            <button class="ftag ftag-orange" data-value="Monthly">Monthly</button>
          </div>
        </div>
        <div class="filter-category">
          <h3 class="filter-cat-title">Edition</h3>
          <div class="filter-cat-options">
            <button class="ftag ftag-brown" data-value="5e (5th Edition)">5e (5th Edition)</button>
            <button class="ftag ftag-brown" data-value="3.5e">3.5e</button>
            <button class="ftag ftag-brown" data-value="Pathfinder 1e/2e">Pathfinder 1e/2e</button>
          </div>
        </div>
      </div>

      <hr class="section-divider" />

      <div class="filter-category filter-category-wide">
        <h3 class="filter-cat-title">Distance</h3>
        <div class="filter-cat-options filter-cat-options-row">
          <button class="ftag ftag-yellow" data-value="≤ 1 mile away">≤ 1 mile away</button>
          <button class="ftag ftag-yellow" data-value="1-2 miles away">1-2 miles away</button>
          <button class="ftag ftag-yellow" data-value="2-5 miles away">2-5 miles away</button>
          <button class="ftag ftag-yellow" data-value="5-10 miles away">5-10 miles away</button>
        </div>
      </div>
    </main>

    <!-- Profile Page -->
    <main class="profile-page page" id="page-profile" style="display:none;">
      <div class="profile-header">
        <button class="back-btn" id="back-btn" aria-label="Go back">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <h2 class="profile-page-title">My Profile</h2>
      </div>

      <hr class="section-divider" />

      <div class="profile-top-row">
        <span class="profile-name" id="display-name" data-field="name">[Name]</span>
        <span class="profile-role-badge" id="display-role" data-field="role">[Role]</span>
        <button class="edit-btn" aria-label="Edit profile">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
        </button>
      </div>

      <div class="profile-content">
        <div class="profile-photo-section">
          <div class="profile-photo-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
          </div>
          <span class="change-photo-link">Change Photo</span>
        </div>

        <div class="profile-fields">
          <div class="profile-field" data-field="playStyle">
            <span class="field-label">Play style</span>
            <span class="field-value" id="display-playStyle">Select...</span>
          </div>
          <div class="profile-field" data-field="experience">
            <span class="field-label">Experience level</span>
            <span class="field-value" id="display-experience">Select...</span>
          </div>
          <div class="profile-field" data-field="commitment">
            <span class="field-label">Commitment level</span>
            <span class="field-value" id="display-commitment">Select...</span>
          </div>
          <div class="profile-field" data-field="location">
            <span class="field-label">Location</span>
            <span class="field-value" id="display-location">Enter...</span>
          </div>
          <div class="profile-field" data-field="schedule">
            <span class="field-label">Schedule</span>
            <span class="field-value" id="display-schedule">Select...</span>
          </div>
        </div>
      </div>
    </main>

    <!-- My Group page -->
    <main class="group-page page" id="page-group" style="display:none;">
    </main>

    <!-- My Groups -->
    <main class="my-groups-page page" id="group-listing" style="display:none;">
    </main>

    <!-- Group chat -->
    <main>

    </main>

    <!-- Selection Overlay -->
    <div class="overlay" id="overlay" style="display:none;">
      <div class="overlay-panel">
        <div class="overlay-header">
          <h3 class="overlay-title" id="overlay-title">Select</h3>
          <button class="overlay-close" id="overlay-close" aria-label="Close">&times;</button>
        </div>
        <div class="overlay-body" id="overlay-body">
          <!-- Options or text input get injected here -->
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
